<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Orchestrated Workflow Shadow DOM Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
    }

    root-provider {
      display: block;
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<div>
  <root-provider></root-provider>
</div>

<script>

class RootProvider extends HTMLElement {
  constructor() {
    super();
    const shadow = this.attachShadow({ mode: "open" });

    const container = document.createElement("div");
    container.innerHTML = `
      <style>
        .wrapper {
          padding: 20px;
        }
      </style>

      <div class="wrapper">
        <div>
          <orchestrated-workflow></orchestrated-workflow>
        </div>
      </div>
    `;

    shadow.appendChild(container);
  }
}

customElements.define("root-provider", RootProvider);


class OrchestratedWorkflow extends HTMLElement {
  constructor() {
    super();

    const shadow = this.attachShadow({ mode: "open" });

    const container = document.createElement("div");

    container.innerHTML = `
      <style>
        .workflow {
          background: white;
          padding: 30px;
          border-radius: 8px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .plans {
          display: flex;
          gap: 20px;
        }
      </style>

      <div class="workflow">
        <h2>Choose Your Plan</h2>

        <div class="plans">
          <plan-card plan="Starter"></plan-card>
          <plan-card plan="Pro"></plan-card>
          <plan-card plan="Enterprise"></plan-card>
        </div>

      </div>
    `;

    shadow.appendChild(container);
  }
}

customElements.define("orchestrated-workflow", OrchestratedWorkflow);


class PlanCard extends HTMLElement {
  constructor() {
    super();

    const shadow = this.attachShadow({ mode: "open" });

    const plan = this.getAttribute("plan") || "Plan";

    const container = document.createElement("div");

    container.innerHTML = `
      <style>
        .card {
          width: 200px;
          border: 1px solid #ddd;
          border-radius: 6px;
          padding: 16px;
          text-align: center;
          background: #fafafa;
        }

        button {
          margin-top: 10px;
          padding: 8px 12px;
          border: none;
          background: #4a6cf7;
          color: white;
          border-radius: 4px;
          cursor: pointer;
        }
      </style>

      <div class="card">
        <h3>${plan}</h3>
        <p>Some description of the ${plan} plan.</p>
        <select-plan></select-plan>
      </div>
    `;

    shadow.appendChild(container);
  }
}

customElements.define("plan-card", PlanCard);


class SelectPlan extends HTMLElement {
  constructor() {
    super();

    const shadow = this.attachShadow({ mode: "open" });

    const container = document.createElement("div");

    container.innerHTML = `
      <style>
        button {
          padding: 8px 14px;
          border: none;
          background: #1db954;
          color: white;
          border-radius: 4px;
          cursor: pointer;
        }
      </style>

      <button>Select Plan</button>
    `;

    shadow.appendChild(container);
  }
}

customElements.define("select-plan", SelectPlan);

</script>

</body>
</html>
