<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Links Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1e1e1e;
    --border-card: #2a2a2a;
    --accent: #6366f1;
    --accent-dim: #3d3d6b;
    --accent-bg: #1e1e3a;
    --text: #e5e5e5;
    --text-muted: #777;
    --text-dim: #444;
    --text-faint: #2a2a2a;
    --badge-bg: #1a1a1a;
    --danger: #7f3030;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── HEADER ── */
  header {
    max-width: 960px;
    margin: 0 auto;
    padding: 56px 48px 40px;
    border-bottom: 1px solid var(--border);
  }
  .header-meta {
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -.02em;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle { font-size: 15px; color: var(--text-muted); line-height: 1.6; }

  /* ── MAIN ── */
  main { max-width: 960px; margin: 0 auto; padding: 0 48px; }

  /* ── SECTION ── */
  .section { padding-top: 48px; }
  .section-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-icon { font-size: 18px; color: var(--accent); width: 24px; }
  .section-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -.01em;
    flex: 1;
    cursor: text;
    outline: none;
    border: none;
    background: transparent;
    color: var(--text);
    border-bottom: 1px solid transparent;
  }
  .section-title:focus { border-bottom-color: var(--accent); }
  .section-tag {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
  }
  .section-count { font-size: 12px; color: #333; font-weight: 600; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border-card);
    border-radius: 10px;
    padding: 18px 20px;
    transition: border-color .15s, background .15s;
  }
  .card.has-url { border-color: var(--accent-dim); }
  .card:hover { background: #1a1a1a; }
  .card.has-url:hover { border-color: var(--accent); }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-left { display: flex; align-items: center; gap: 8px; }

  .badge {
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    background: var(--badge-bg);
    color: var(--text-dim);
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
    border: 1px solid #2a2a2a;
  }
  .has-url .badge { background: var(--accent-bg); color: #818cf8; border-color: var(--accent-dim); }

  .card-name { font-size: 14px; font-weight: 600; color: #ccc; }

  .edit-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 0 2px;
    line-height: 1;
    transition: color .15s;
    opacity: 0;
  }
  .card:hover .edit-btn { opacity: 1; }
  .edit-btn:hover { color: var(--accent); }

  .card-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    text-decoration: none;
  }
  .link-text {
    font-size: 12px;
    color: var(--accent);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .link-arrow { font-size: 14px; color: var(--accent); flex-shrink: 0; }
  .card-empty {
    font-size: 12px;
    color: #3a3a3a;
    font-style: italic;
    cursor: pointer;
  }
  .card-empty:hover { color: var(--accent); }

  /* ── EDIT FORM ── */
  .edit-form { display: none; }
  .card.editing .edit-form { display: block; }
  .card.editing .card-view { display: none; }

  .edit-grid {
    display: grid;
    grid-template-columns: 1fr 90px;
    gap: 8px;
    margin-bottom: 10px;
  }
  .edit-grid .full { grid-column: 1 / -1; }

  input[type="text"], input[type="url"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    font-family: inherit;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }

  .edit-actions { display: flex; gap: 8px; }
  .btn-save {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
  }
  .btn-cancel {
    background: none;
    color: #555;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-delete {
    background: none;
    color: var(--danger);
    border: 1px solid #3a1e1e;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    margin-left: auto;
  }

  /* ── ADD CARD ── */
  .add-card {
    background: none;
    border: 1px dashed #222;
    border-radius: 10px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    color: #333;
    transition: border-color .15s, color .15s;
    font-family: inherit;
    width: 100%;
  }
  .add-card:hover { border-color: var(--accent-dim); color: var(--accent); }
  .add-plus { font-size: 20px; line-height: 1; }
  .add-label { font-size: 13px; font-weight: 500; }

  /* ── ADD SECTION ── */
  .add-section {
    margin-top: 40px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 14px 24px;
    color: #333;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    display: block;
    width: 100%;
    transition: border-color .15s, color .15s;
    font-family: inherit;
  }
  .add-section:hover { border-color: var(--accent-dim); color: var(--accent); }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-top: 64px;
  }

  @media (max-width: 600px) {
    header, main { padding-left: 20px; padding-right: 20px; }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-meta">Projects · Links · CI/CD</div>
  <h1>Project <em>Links</em> Hub</h1>
  <p class="subtitle">All your repos, pipelines, and services — one place.<br>Click any card to add or edit a URL.</p>
</header>

<main id="main"></main>

<footer>All links stored locally in your browser</footer>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'project-links-hub-v2';

const DEFAULT_DATA = [
  {
    id: 's1', label: 'Repositories', tag: 'Source Code', icon: '⌥',
    items: [
      { id: 'r1', name: 'Frontend',     url: '', badge: 'React'     },
      { id: 'r2', name: 'Backend',      url: '', badge: 'Node'      },
      { id: 'r3', name: 'Electron App', url: '', badge: 'Electron'  },
      { id: 'r4', name: 'Services',     url: '', badge: 'Monorepo'  },
    ]
  },
  {
    id: 's2', label: 'Deploy Jobs', tag: 'CI / CD', icon: '⚡',
    items: [
      { id: 'd1', name: 'Frontend Deploy',   url: '', badge: 'Pipeline' },
      { id: 'd2', name: 'Backend Deploy',    url: '', badge: 'Pipeline' },
      { id: 'd3', name: 'Backend Promoter',  url: '', badge: 'Promote'  },
    ]
  },
  {
    id: 's3', label: 'Services & Infra', tag: 'Infrastructure', icon: '◈',
    items: [
      { id: 'sv1', name: 'Services Repo', url: '', badge: 'Config' },
    ]
  }
];

function uid() { return Math.random().toString(36).slice(2, 8); }

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || DEFAULT_DATA; }
  catch { return DEFAULT_DATA; }
}

function save(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch {}
}

let state = load();

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  state.forEach(sec => {
    const el = document.createElement('div');
    el.className = 'section';
    el.dataset.sec = sec.id;
    el.innerHTML = `
      <div class="section-head">
        <span class="section-icon">${sec.icon}</span>
        <input class="section-title" value="${esc(sec.label)}" data-field="label" title="Click to rename" />
        <span class="section-tag">${esc(sec.tag)}</span>
        <span class="section-count">×${sec.items.length}</span>
      </div>
      <div class="grid" data-grid="${sec.id}">
        ${sec.items.map(item => cardHTML(item)).join('')}
        <button class="add-card" data-add="${sec.id}">
          <span class="add-plus">+</span>
          <span class="add-label">Add link</span>
        </button>
      </div>
    `;
    main.appendChild(el);
  });

  // Add section button
  const addSec = document.createElement('button');
  addSec.className = 'add-section';
  addSec.textContent = '+ Add section';
  addSec.addEventListener('click', onAddSection);
  main.appendChild(addSec);

  attachEvents();
}

function cardHTML(item) {
  const hasUrl = item.url && item.url.trim();
  const displayUrl = hasUrl ? item.url.replace(/^https?:\/\//, '') : '';
  return `
    <div class="card ${hasUrl ? 'has-url' : ''}" data-item="${item.id}">
      <div class="card-view">
        <div class="card-top">
          <div class="card-left">
            ${item.badge ? `<span class="badge">${esc(item.badge)}</span>` : ''}
            <span class="card-name">${esc(item.name)}</span>
          </div>
          <button class="edit-btn" data-edit="${item.id}" title="Edit">✎</button>
        </div>
        ${hasUrl
          ? `<a class="card-link" href="${esc(item.url)}" target="_blank" rel="noopener">
               <span class="link-text">${esc(displayUrl)}</span>
               <span class="link-arrow">↗</span>
             </a>`
          : `<span class="card-empty" data-edit="${item.id}">click to add URL →</span>`
        }
      </div>
      <div class="edit-form">
        <div class="edit-grid">
          <input type="text" class="ef-name" placeholder="Name" value="${esc(item.name)}" />
          <input type="text" class="ef-badge" placeholder="Badge" value="${esc(item.badge || '')}" />
          <input type="url" class="ef-url full" placeholder="https://..." value="${esc(item.url || '')}" />
        </div>
        <div class="edit-actions">
          <button class="btn-save" data-save="${item.id}">Save</button>
          <button class="btn-cancel" data-cancel="${item.id}">Cancel</button>
          <button class="btn-delete" data-delete="${item.id}">Delete</button>
        </div>
      </div>
    </div>
  `;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
function attachEvents() {
  const main = document.getElementById('main');

  // Section title rename
  main.querySelectorAll('.section-title').forEach(inp => {
    inp.addEventListener('change', e => {
      const secEl = e.target.closest('.section');
      const sec = state.find(s => s.id === secEl.dataset.sec);
      if (sec) { sec.label = e.target.value; save(state); updateCount(secEl, sec); }
    });
  });

  // Edit button / empty click → open form
  main.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openEdit(btn.dataset.edit);
    });
  });

  // Save
  main.querySelectorAll('[data-save]').forEach(btn => {
    btn.addEventListener('click', () => saveItem(btn.dataset.save));
  });

  // Cancel
  main.querySelectorAll('[data-cancel]').forEach(btn => {
    btn.addEventListener('click', () => closeEdit(btn.dataset.cancel));
  });

  // Delete
  main.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', () => deleteItem(btn.dataset.delete));
  });

  // Add link
  main.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', () => addItem(btn.dataset.add));
  });

  // Enter key in URL field saves
  main.querySelectorAll('.ef-url').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const card = inp.closest('.card');
        if (card) saveItem(card.dataset.item);
      }
    });
  });
}

function openEdit(itemId) {
  const card = document.querySelector(`.card[data-item="${itemId}"]`);
  if (!card) return;
  card.classList.add('editing');
  card.querySelector('.ef-name')?.focus();
}

function closeEdit(itemId) {
  // reset form values and close
  const card = document.querySelector(`.card[data-item="${itemId}"]`);
  if (!card) return;
  const item = findItem(itemId);
  if (item) {
    card.querySelector('.ef-name').value = item.name;
    card.querySelector('.ef-badge').value = item.badge || '';
    card.querySelector('.ef-url').value = item.url || '';
  }
  card.classList.remove('editing');
}

function saveItem(itemId) {
  const card = document.querySelector(`.card[data-item="${itemId}"]`);
  if (!card) return;
  const name  = card.querySelector('.ef-name').value.trim();
  const badge = card.querySelector('.ef-badge').value.trim();
  const url   = card.querySelector('.ef-url').value.trim();

  state.forEach(sec => {
    sec.items = sec.items.map(it =>
      it.id === itemId ? { ...it, name: name || it.name, badge, url } : it
    );
  });
  save(state);
  render();
}

function deleteItem(itemId) {
  state.forEach(sec => { sec.items = sec.items.filter(it => it.id !== itemId); });
  save(state);
  render();
}

function addItem(secId) {
  const sec = state.find(s => s.id === secId);
  if (!sec) return;
  const id = uid();
  sec.items.push({ id, name: 'New Link', url: '', badge: '' });
  save(state);
  render();
  // auto-open the new card
  setTimeout(() => openEdit(id), 0);
}

function onAddSection() {
  const id = uid();
  state.push({ id, label: 'New Section', tag: 'Custom', icon: '◇', items: [] });
  save(state);
  render();
}

function findItem(id) {
  for (const sec of state) {
    const it = sec.items.find(i => i.id === id);
    if (it) return it;
  }
  return null;
}

function updateCount(secEl, sec) {
  const el = secEl.querySelector('.section-count');
  if (el) el.textContent = `×${sec.items.length}`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
